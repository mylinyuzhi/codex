[package]
name = "coco-permissions"
version.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
coco-types.workspace = true
coco-error.workspace = true
coco-messages.workspace = true
coco-config.workspace = true
# DenialTracker lives in `coco-tool-runtime` because it is per-
# `ToolUseContext` runtime state (fork-isolated when
# `local_denial_tracking` is set). The auto-mode classifier here
# operates on the same type to honor fork isolation. TS parity:
# `permissions.ts:553-558` reads `context.localDenialTracking ??
# appState.denialTracking ?? createDenialTrackingState()`.
coco-tool-runtime.workspace = true

serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tracing.workspace = true
regex.workspace = true

[dev-dependencies]
pretty_assertions.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["rt", "macros"] }

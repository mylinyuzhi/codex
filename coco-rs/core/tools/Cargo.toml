[package]
name = "coco-tools"
version.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
coco-types.workspace = true
coco-tool.workspace = true
coco-context.workspace = true
coco-shell.workspace = true
coco-skills.workspace = true
coco-memory.workspace = true
coco-secret-redact.workspace = true
coco-file-encoding.workspace = true
coco-file-ignore.workspace = true
coco-utils-image.workspace = true

serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
anyhow.workspace = true
chrono.workspace = true
async-trait.workspace = true
base64.workspace = true
futures.workspace = true
globset.workspace = true
html2text.workspace = true
rand.workspace = true
ignore.workspace = true
grep-regex.workspace = true
grep-searcher.workspace = true
pdf-extract.workspace = true
regex.workspace = true
walkdir.workspace = true
tokio = { workspace = true, features = ["process", "time", "fs"] }
tokio-util.workspace = true
tracing.workspace = true
reqwest = { workspace = true, features = ["rustls-tls", "stream"] }

[dev-dependencies]
pretty_assertions.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tempfile.workspace = true
coco-tool = { workspace = true, features = ["testing"] }
# Test-only image crate features — tests need to generate real 1x1
# fixtures to exercise the FileRead → coco-utils-image pipeline.
image = { workspace = true, features = ["jpeg", "png", "gif", "webp"] }

[package]
name = "vercel-ai-provider-utils"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Vercel AI SDK provider utilities for Rust"

[dependencies]
vercel-ai-provider = { path = "../provider" }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["sync", "rt", "time", "fs", "io-util", "macros"] }
tokio-stream = { workspace = true }
tokio-util = { workspace = true, features = ["io"] }
futures = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
reqwest = { workspace = true, features = ["json", "stream", "multipart"] }
thiserror = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
tracing = { workspace = true }
mime = "0.3"
url = "2"
rand = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
regex = { workspace = true }
urlencoding = { workspace = true }
once_cell = { workspace = true }
rustc_version_runtime = "0.3"
schemars = { version = "0.8", optional = true }
jsonschema = { version = "0.18", optional = true }

[features]
default = []
json-schema = ["schemars"]
schema-validation = ["jsonschema"]

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }

[lints]
workspace = true
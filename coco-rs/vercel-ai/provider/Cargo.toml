[package]
name = "vercel-ai-provider"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Vercel AI SDK provider types for Rust"

[dependencies]
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }
regex = { workspace = true }
tokio = { workspace = true, features = ["sync", "rt", "macros"] }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }
base64 = { workspace = true }
chrono.workspace = true
schemars = { workspace = true, optional = true }

[features]
default = []
# Opt-in JSON Schema derives on the DTO types reachable from
# `LanguageModelV4Message`. Gated so the schemars transitive deps
# (dyn-clone, etc.) don't ship in normal builds. Wired through
# `coco-llm-types/schema` → `coco-types/schema`.
schema = ["dep:schemars"]

[lints]
workspace = true

[package]
name = "coco-provider-auth"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "coco_provider_auth"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
coco-config.workspace = true
coco-error.workspace = true
coco-inference.workspace = true
coco-keyring-store.workspace = true
coco-secret-redact.workspace = true
coco-types.workspace = true

arc-swap.workspace = true
base64.workspace = true
rand.workspace = true
reqwest = { workspace = true, features = ["json", "rustls-tls"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
sha2.workspace = true
snafu.workspace = true
tiny_http.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync", "time"] }
tracing = { workspace = true, features = ["log"] }
url.workspace = true
urlencoding.workspace = true
webbrowser.workspace = true

[dev-dependencies]
pretty_assertions.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["test-util"] }
wiremock.workspace = true

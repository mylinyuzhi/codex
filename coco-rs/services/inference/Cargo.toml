[package]
name = "coco-inference"
version.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
coco-types.workspace = true
coco-config.workspace = true
coco-otel.workspace = true
vercel-ai-provider.workspace = true
# Concrete provider crates — `coco-inference` is the canonical home for
# `Arc<dyn LanguageModel>` construction. No other crate may depend on
# these directly (enforced by scripts/check-vercel-ai-seam.sh).
vercel-ai-anthropic.workspace = true
vercel-ai-openai.workspace = true
vercel-ai-openai-compatible.workspace = true
vercel-ai-google.workspace = true

serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
anyhow.workspace = true
sha2.workspace = true
tokio = { workspace = true, features = ["sync", "time"] }
async-trait.workspace = true
tracing.workspace = true
futures.workspace = true
reqwest.workspace = true

[dev-dependencies]
pretty_assertions.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["rt", "macros"] }
vercel-ai.workspace = true
futures.workspace = true

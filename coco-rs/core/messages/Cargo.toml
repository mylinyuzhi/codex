[package]
name = "coco-messages"
version.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
coco-types.workspace = true
coco-llm-types.workspace = true

serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
uuid = { workspace = true, features = ["v4"] }
# `attachment_emitter` uses `tokio::sync::mpsc::UnboundedSender` for its
# cross-crate AttachmentMessage channel — no other tokio surface is needed.
tokio = { workspace = true, features = ["sync"] }

[dev-dependencies]
pretty_assertions.workspace = true
